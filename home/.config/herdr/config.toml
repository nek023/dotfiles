onboarding = false

[theme]
name = "catppuccin"

[keys]
prefix = "ctrl+t"

detach = "prefix+d"
reload_config = "prefix+r"

new_workspace = "prefix+t"
close_workspace = "prefix+shift+c"
next_workspace = ["prefix+n", "alt+down"]
previous_workspace = ["prefix+p", "alt+up"]
rename_workspace = "prefix+comma"
switch_workspace = "prefix+1..9"

new_tab = "prefix+shift+t"
next_tab = "prefix+shift+n"
previous_tab = "prefix+shift+p"

close_pane = "prefix+c"
split_vertical = "prefix+|"
split_horizontal = "prefix+minus"
zoom = "prefix+z"

next_agent = ["prefix+]", "alt+shift+down"]
previous_agent = ["prefix+[", "alt+shift+up"]

[[keys.command]]
key = "prefix+g"
type = "popup"
command = "lazygit"
description = "lazygit"
width = "100%"
height = "100%"

[[keys.command]]
key = "prefix+h"
type = "popup"
command = "hunk diff"
description = "hunk diff (working tree)"
width = "100%"
height = "100%"

[ui]
hide_tab_bar_when_single_tab = true
prompt_new_tab_name = false

[ui.toast]
delivery = "terminal"
delay_seconds = 0

[ui.toast.clipboard]
enabled = true
position = "top-right"

[ui.toast.herdr]
position = "top-right"

[ui.sound]
enabled = false

[ui.sidebar.spaces]
rows = [
  ["state_icon", "workspace"],
  ["branch"],
  [
    "$PR",
    { token = "$CI_OK", fg = "#a6e3a1" },
    { token = "$CI_FAIL", fg = "#f38ba8" },
    { token = "$CI_PENDING", fg = "#f9e2af" },
    { token = "$CI_MERGED", fg = "#cba6f7" },
    { token = "$CI_CLOSED", fg = "#f38ba8", dim = true },
  ],
]
