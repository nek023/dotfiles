onboarding = false

[theme]
name = "catppuccin"

[keys]
prefix = "ctrl+t"

detach = "prefix+d"
reload_config = "prefix+r"

new_workspace = "prefix+t"
close_workspace = "prefix+shift+c"
next_workspace = "prefix+n"
previous_workspace = "prefix+p"
rename_workspace = "prefix+comma"
switch_workspace = "prefix+1..9"

new_tab = "prefix+shift+t"
next_tab = "prefix+shift+n"
previous_tab = "prefix+shift+p"

close_pane = "prefix+c"
split_vertical = "prefix+|"
split_horizontal = "prefix+minus"
zoom = "prefix+z"

next_agent = "prefix+]"
previous_agent = "prefix+["

[ui]
prompt_new_tab_name = false

[ui.toast]
delivery = "terminal"
delay_seconds = 0

[ui.toast.clipboard]
enabled = true

[ui.sound]
enabled = false
